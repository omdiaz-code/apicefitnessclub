<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ápice Fitness Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #001229;
            --accent: #D4AF37;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #001C3D, #000914);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-family: 'Outfit'; color: var(--accent); margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #dashboard { display: none; width: 90%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { 
            background: var(--glass); 
            padding: 15px; 
            border-radius: 12px; 
            position: relative; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: cover; 
            border-radius: 8px; 
        }
        .card-info {
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .btn-delete { 
            background: #ff4444; 
            color: white; 
            border: none; 
            padding: 8px; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: auto;
        }
        .upload-section { margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        select { padding: 10px; margin-right: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="login-box" class="login-box">
        <h1>Admin Ápice</h1>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>


    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="color: var(--accent);">Panel Ápice</h1>
            <button onclick="logout()" style="width: auto; padding: 10px 20px;">Cerrar Sesión</button>
        </div>

        <div style="display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
            <button onclick="switchTab('tab-gallery')" style="background:none; color:white; border-bottom: 2px solid var(--accent); border-radius: 0;">Galerías</button>
            <button onclick="switchTab('tab-team')" style="background:none; color:white; border-radius: 0;">Gestionar Equipo</button>
        </div>

        <!-- Tab Galerías -->
        <div id="tab-gallery">
            <div class="upload-section">
                <h3>Subir a Álbum (Solo Fotos/Videos)</h3>
                <select id="album-select">
                    <option value="fuerza">Instalaciones (Fuerza)</option>
                    <option value="cardio">Instalaciones (Cardio)</option>
                    <option value="masoterapia">Instalaciones (Masoterapia)</option>
                    <option value="beneficios">Experiencia/Beneficios</option>
                </select>
                <input type="file" id="file-input" multiple accept="image/*,video/*" style="width: auto;">
                <button onclick="uploadImages()" style="width: auto; margin-left: 10px;">Subir</button>
            </div>

            <h3>Administrar Imágenes</h3>
            <select id="view-album" onchange="loadImages()">
                <option value="fuerza">Instalaciones (Fuerza)</option>
                <option value="cardio">Instalaciones (Cardio)</option>
                <option value="masoterapia">Instalaciones (Masoterapia)</option>
                <option value="beneficios">Experiencia/Beneficios</option>
            </select>
            <div id="image-grid" class="grid"></div>
        </div>

        <!-- Tab Equipo -->
        <div id="tab-team" style="display: none;">
            <div class="upload-section">
                <h3>Agregar Integrante del Equipo</h3>
                <input type="text" id="member-name" placeholder="Nombre (ej. Juan Pérez)">
                <input type="text" id="member-desc" placeholder="Descripción (ej. Preparador Físico...)">
                <input type="file" id="member-photo" accept="image/*" style="width: auto;">
                <button onclick="addTeamMember()">Guardar Integrante</button>
            </div>

            <h3>Nuestro Equipo Actual</h3>
            <div id="team-list" class="grid"></div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        if (token) showDashboard();

        function switchTab(tabId) {
            document.getElementById('tab-gallery').style.display = tabId === 'tab-gallery' ? 'block' : 'none';
            document.getElementById('tab-team').style.display = tabId === 'tab-team' ? 'block' : 'none';
            if (tabId === 'tab-team') loadTeam();
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                token = data.token;
                localStorage.setItem('token', token);
                showDashboard();
            } else {
                alert('Error: ' + data.message);
            }
        }

        function showDashboard() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadImages();
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        // Gallery Logic
        async function loadImages() {
            const album = document.getElementById('view-album').value;
            const res = await fetch(`/api/images/${album}`);
            const images = await res.json();
            const grid = document.getElementById('image-grid');
            grid.innerHTML = images.map(url => `
                <div class="card">
                    <img src="${url}">
                    <button class="btn-delete" onclick="deleteImage('${url}')">Eliminar</button>
                </div>
            `).join('');
        }

        async function uploadImages() {
            const album = document.getElementById('album-select').value;
            const files = document.getElementById('file-input').files;
            if (!files.length) return alert('Selecciona archivos');

            const formData = new FormData();
            formData.append('album', album);
            for (let i = 0; i < files.length; i++) {
                formData.append('images', files[i]);
            }

            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (res.ok) {
                alert('Subido con éxito');
                loadImages();
            } else { alert('Error al subir'); }
        }

        async function deleteImage(url) {
            if (!confirm('¿Borrar archivo?')) return;
            const res = await fetch('/api/images', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ imageUrl: url })
            });
            if (res.ok) loadImages();
            else alert('Error al borrar');
        }

        // Team Logic
        async function loadTeam() {
            const res = await fetch('/api/team');
            const team = await res.json();
            const grid = document.getElementById('team-list');
            grid.innerHTML = team.map(m => `
                <div class="card">
                    <img src="${m.photo || '../logo.png'}">
                    <div class="card-info">
                        <strong>${m.name}</strong><br>
                        <small>${m.desc}</small>
                    </div>
                    <button class="btn-delete" onclick="deleteMember(${m.id})">Eliminar Persona</button>
                </div>
            `).join('');
        }

        async function addTeamMember() {
            const name = document.getElementById('member-name').value;
            const desc = document.getElementById('member-desc').value;
            const photo = document.getElementById('member-photo').files[0];
            if (!name || !photo) return alert('Nombre y Foto son obligatorios');

            const formData = new FormData();
            formData.append('album', 'equipo');
            formData.append('name', name);
            formData.append('desc', desc);
            formData.append('photo', photo);

            const res = await fetch('/api/team', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            const data = await res.json();
            if (res.ok && data.success) {
                alert('Equipo actualizado');
                document.getElementById('member-name').value = '';
                document.getElementById('member-desc').value = '';
                document.getElementById('member-photo').value = '';
                loadTeam();
            } else { 
                alert('Error al guardar: ' + (data.error || 'Servidor no respondió correctamente')); 
            }
        }

        async function deleteMember(id) {
            if (!confirm('¿Borrar integrante?')) return;
            const res = await fetch(`/api/team/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) loadTeam();
            else alert('Error al borrar');
        }
    </script>
</body>
</html>
